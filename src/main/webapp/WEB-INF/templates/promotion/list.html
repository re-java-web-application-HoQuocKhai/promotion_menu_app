<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="vi"
      layout:decorate="~{layouts/home}">
<head>
  <link rel="stylesheet" th:href="@{/resources/css/style.css}">
  <title>Promotion Menu App</title>
</head>
<body>

<main layout:fragment="content">
  <h2>List of dishes</h2>
  <table>
    <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Original Price</th>
      <th>Discount Percent</th>
      <th>Action</th>
    </tr>
    <tr th:each="promotion : ${promotions}">
      <td th:text="${promotion.id}"></td>
      <td th:text="${promotion.name}"></td>
      <td th:text="${promotion.age}"></td>
      <td th:text="${promotion.id}"></td>
      <td>
        <button class="detail-btn">Detail</button>
        <button class="edit-btn">Edit</button>
        <button class="remove-btn">Remove</button>
        <a th:href="@{/promotions/detail(id=${promotion.id})}">xem chi tiết</a>
      </td>
    </tr>
  </table>
</main>
</body>
</html>
